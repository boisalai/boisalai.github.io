<!DOCTYPE html>
<html lang="en">
    <head>
        <title>revdisp</title>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="Revenu disponible">
        <meta name="author" content="Alain Boisvert">

        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
        <link rel="stylesheet" href="index.css">

        <!-- development version, includes helpful console warnings -->
        <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
        <!-- production version, optimized for size and speed -->
        <!--
            <script src="https://cdn.jsdelivr.net/npm/vue"></script>
        -->
    </head>
    <body>
        <div id="app">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <a class="navbar-brand" href="#">{{ title }}</a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item active">
                            <a class="nav-link" href="#">Modèle <span class="sr-only">(current)</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Utilisation</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Documentation</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#">Disabled</a>
                        </li>
                    </ul>
                </div>
                <form class="form-inline">
                    <button class="btn btn-outline-success my-2 my-sm-0" v-on:click="changeLanguage">{{ language }}</button>
                </form>
            </nav>

            <p></p>
            <h4>Questions</h4>

            <form>
                <!--
                <div class="form-group">
                    <label for="exampleFormControlInput1">Email address</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
                </div>
                -->
                <div class="form-group">
                    <label for="years">Année(s) fiscale(s)</label>
                    <select multiple class="form-control" id="years">
                        <option>2019</option>
                        <option>2018</option>
                        <option>2017</option>
                        <option>2016</option>
                        <option>2015</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="family">Votre situation familiale</label>
                    <select class="form-control" id="family">
                        <option>Personne vivant seule</option>
                        <option>Couple sans enfant</option>
                        <option>Fanille monoparentale, 1 enfant</option>
                        <option>Famille monoparentale, 2 enfants</option>
                        <option>Famille monoparentale, 3 enfants</option>
                        <option>Famille monoparentale, 4 enfants</option>
                        <option>Famille monoparentale, 5 enfants</option>
                        <option>Couple, 1 enfant</option>
                        <option>Couple, 2 enfants</option>
                        <option>Couple, 3 enfants</option>
                        <option>Couple, 4 enfants</option>
                        <option>Couple, 5 enfants</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="age1">Votre âge</label>
                    <select class="form-control" id="age1">
                        <option>Moins de 18 ans</option>
                        <option>De 18 è 24 ans</option>
                        <option>De 24 à 64 ans</option>
                        <option>65 ans ou plus</option>
                    </select>
                </div>
                
                <div class="form-group" v-show="isCouple">
                    <label for="age2">Âge de votre conjoint(e)</label>
                    <select class="form-control" id="age2">
                        <option>Moins de 18 ans</option>
                        <option>De 18 è 24 ans</option>
                        <option>De 24 à 64 ans</option>
                        <option>65 ans ou plus</option>
                    </select>
                </div>

                <div class="card" v-show="numberOfChildren >= 1">
                    <h5 class="card-header">Premier enfant</h5>
                    <div class="card-body">
                        <div class="form-group">
                            <label for="childAge1">Âge</label>
                            <select class="form-control" id="childAge1">
                                <option>Moins de 6 ans</option>
                                <option>De 6 à 17 ans</option>
                                <option>18 ans ou plus</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="childCare1">Frais de garde</label>
                            <div class="input-group mb-3">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">$</span>
                                </div>
                                <input type="text" class="form-control" id="childCare1"
                                    aria-label="Amount (to the nearest dollar)">
                                <div class="input-group-append">
                                    <span class="input-group-text">.00</span>
                                </div>
                            </div>
                        </div>
            
                        <div class="form-group">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="childCheck1">
                                <label class="form-check-label" for="childCheck1">
                                Service de garde subventionné?
                                </label>
                            </div>
                        </div>
                        
                    </div>
                </div>

                <div class="card" style="width: 100%;">
                    <h5 class="card-header">Tableaux et graphiques</h5>
                    <div class="card-body">
                        <div class="form-group">
                            <label for="exampleFormControlSelect2">Choisissez un ou plusieur tableaux et graphiques</label>
                            <select multiple class="form-control" id="exampleFormControlSelect2">
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>
                                <option>5</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="gridCheck">
                                <label class="form-check-label" for="gridCheck">
                                Taux marginaux implicites de taxation
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <button type="button" class="btn btn-primary" v-on:click="calculate">Calculer</button>

            <p></p> 
            <h3>Résultats</h3>

            <div v-html="table1"></div>
        </div>
        
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
        <script src="index.js"></script>
    </body>
</html>
